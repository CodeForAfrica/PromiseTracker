name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN across all jobs.
permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
