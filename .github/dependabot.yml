version: 2
updates:
  # Continuous software-composition security updates for app dependencies.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      payload:
        patterns:
          - "@payloadcms/*"
          - "payload"
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
